openapi: 3.0.0
info:
  version: '1.0.0'
  title: File API

paths:
  /status:
    get:
      summary: Status
      description: Get Status.
      responses:
        '200':
          description: It's a response.

  /files/metas:
    post:
      summary: Retrieve metadata for multiple files by token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilesMetaRequest'
      responses:
        '200':
          description: Batch file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilesMetaResponse'

  /file/{token}:
    get:
      summary: Download a file by token
      parameters:
        - $ref: '#/components/parameters/TokenParam'
      responses:
        '200':
          description: File binary with metadata headers
          headers:
            X-Filename:
              description: Original filename
              schema:
                type: string
            X-Filesize:
              description: File size in bytes
              schema:
                type: integer
            X-CreateTime:
              description: File creation time (ISO-8601)
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: string
                format: binary

components:
  parameters:
    TokenParam:
      name: token
      in: path
      required: true
      schema:
        type: string

  schemas:

    FilesMetaRequest:
      type: object
      properties:
        tokens:
          type: array
          items:
            type: string
      required:
        - tokens

    FileMetadataDto:
      type: object
      properties:
        token:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        contentType:
          type: string
        createTime:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
      required:
        - token
        - filename
        - size
        - contentType
        - createTime
        - meta

    FilesMetaResponse:
      type: object
      properties:
        files:
          type: object
          description: Map from token to its metadata
          additionalProperties:
            $ref: '#/components/schemas/FileMetadataDto'
      required:
        - files

  securitySchemes:
    basicHttpAuthentication:
      description: Basic HTTP Authentication
      type: http
      scheme: Basic

  security:
    - basicAuth: [basicHttpAuthentication]
